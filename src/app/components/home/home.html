    <h1>All Locations</h1>
<div class="grid">
    @if(locationService.housingLocations) {
        @for (housingLocation of locationService.housingLocations; track $index) {
            <app-housing-location
                [location]="housingLocation"
                [isSelected]="selectedLocations.some(loc => loc.id === housingLocation.id)"
                (onLocationClick)="handleLocationClicked($event)"
            >
        </app-housing-location>
        } @empty {
            <h2> No items available </h2>
        }
    } @else {
        <h2>No Locations Available</h2>
    }
</div>
<ul>
    @for(loc of selectedLocations; track $index) {
        <li>{{ loc.name }}</li>
    }
</ul>
</section>
